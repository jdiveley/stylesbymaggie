<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ring handles -->
  <circle cx="24" cy="78" r="14" fill="none" stroke="#C9A84C" stroke-width="5.5"/>
  <circle cx="60" cy="78" r="14" fill="none" stroke="#C9A84C" stroke-width="5.5"/>
  <!-- Pivot -->
  <circle cx="44" cy="42" r="5" fill="#C9A84C"/>
  <!-- Blade 1: left handle up to right tip -->
  <line x1="24" y1="64" x2="78" y2="10" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Blade 2: right handle up to left tip -->
  <line x1="60" y1="64" x2="24" y2="10" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round"/>
</svg>
